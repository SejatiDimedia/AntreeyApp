<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);

<body class="bg-background font-body-md text-on-background min-h-screen flex">
<!-- Split Screen Container -->
<main class="w-full min-h-screen flex flex-col md:flex-row overflow-hidden">
<!-- Left Side: Branding & Illustration -->
<section class="hidden md:flex md:w-1/2 lg:w-3/5 bg-primary overflow-hidden relative items-center justify-center p-container-padding">
<!-- Decorative Elements -->
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-tertiary-container/30 rounded-full blur-3xl"></div>
<div class="relative z-10 flex flex-col items-center text-center max-w-lg">
<div class="mb-section-margin">
<img alt="Antreey Brand Visual" class="rounded-[40px] shadow-2xl border-4 border-primary-container/20 aspect-video object-cover" data-alt="A professional and sleek digital dashboard visualization with minimalist charts and booking data interfaces. The scene is bathed in a soft lime green and charcoal aesthetic with glassmorphic layers that create a sense of organized efficiency. High-end office lighting illuminates a modern workstation where clean, professional software empowers business productivity. The mood is calm, tech-forward, and highly structured." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCJ7bZ3DE7LRBEnvJgPTTRpzly6DmHlAxO4ZcCd0hpvaIOdtxQtm0mgsxss0kuUbbJMbVM9rCHRalj7XAOFTga1BGk3XaxBX7ECOugawQmQqR_izXgHGMeLhVbTXTtDogLVk1q2FFi07-P5yi8OZ-qYX9elBwV7UmqjsM7Rb0aafPvQ6cv2b2RVrGAI-jBmXiJh-cD9wB710ucw-eF9HeQZO15bgrB2WstsBikpBCdvDIz7WRO7FJgJO499sbKVdzyXHngoOre82jYB"/>
</div>
<h1 class="font-headline-xl text-headline-xl text-on-primary mb-unit">Antreey</h1>
<p class="font-body-lg text-body-lg text-primary-fixed-dim px-gutter opacity-90">
                    Streamline your professional bookings with translucent clarity and modern precision.
                </p>
</div>
</section>
<!-- Right Side: Login Form -->
<section class="flex-1 flex flex-col items-center justify-center p-gutter md:p-container-padding bg-surface">
<div class="w-full max-w-[440px]">
<!-- Mobile Logo -->
<div class="md:hidden flex flex-col items-center mb-section-margin">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-unit">
<span class="material-symbols-outlined text-on-primary text-3xl">calendar_today</span>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-surface">Antreey</h2>
</div>
<div class="mb-section-margin">
<h3 class="font-headline-xl text-headline-xl text-on-surface mb-unit">Welcome back</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Please enter your details to sign in.</p>
</div>
<!-- Form Section -->
<form class="space-y-gutter">
<!-- Email Field -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all text-on-surface placeholder:text-outline-variant" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all text-on-surface placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Helpers -->
<div class="flex items-center justify-between py-unit">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container" type="checkbox"/>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-label-md text-label-md text-primary hover:text-on-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-4 rounded-full shadow-md hover:shadow-lg hover:bg-inverse-primary active:scale-[0.98] transition-all duration-200 uppercase tracking-wide" type="submit">
                        Sign In
                    </button>
</form>
<!-- Divider -->
<div class="relative my-section-margin">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-outline-variant opacity-30"></span>
</div>
<div class="relative flex justify-center text-label-sm text-label-sm">
<span class="px-gutter bg-surface text-on-surface-variant">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-gutter">
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors font-label-md text-label-md text-on-surface-variant">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB7yh-S_4vPaGw0qMwVMTkHMsr3BsqRdU1JZRGR4kPnIPcPma6dDfRceFl7T8YsqBG0lYaAq-tl5sVanS5aGzHJ3ALwhQlisDcOxF0gUtfgvCZuSvn3PKeOW_jiI8OvyHs4qBWBRIedFrVEqirwR39NI-b1Mvh8TotmQmPHYot02lQ3UEWctJ849q3zL2pNz7WcndcddV32bR6VCz0MAG3E-wZ2D7ZaWSWHcXMsDoXOQJn9eXSQjHdPuiaJZ2lCsOmU9qjy43OUvyYy"/>
                        Google
                    </button>
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors font-label-md text-label-md text-on-surface-variant">
<span class="material-symbols-outlined text-on-surface-variant" style="font-variation-settings: 'FILL' 1;">ios</span>
                        Apple
                    </button>
</div>
<!-- Footer Link -->
<p class="mt-section-margin text-center font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-label-md hover:underline decoration-2 underline-offset-4 ml-1 transition-all" href="#">Create an account</a>
</p>
</div>
</section>
</main>
</body></html>
